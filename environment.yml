name: openvsp-controller

# Fallback environment for users who prefer Conda.
# The main supported entry point is run_project.bat, which creates a local
# .venv in the repository. This file mirrors the same dependency set.
#
# Important:
# The bundled OpenVSP binary included in this repository links against
# python313.dll, so Python 3.13 is required.

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.13
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.8
  - jupyterlab>=4.0
  - ipykernel>=6.0
  - ipywidgets>=8.0
  - nbformat>=5.9
  - pip
  - pip:
      - optuna>=3.5
      - scikit-optimize>=0.9
      - streamlit>=1.30
      - plotly>=5.18
      - rich>=13.0
